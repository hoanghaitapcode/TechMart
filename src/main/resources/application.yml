spring:
  datasource:
    # URL ket noi toi supabase, thay the thong tin sau khi tao database tren supabase
    url: jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres
    username: postgres.modfomzzdtcagamggymk
    password: Jz3FnSZAq0lxssHK
    driver-class-name: org.postgresql.Driver

    # Cau hinh HikariCP (Connection Pool) ??  ket noi toi Cloud
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Update schema khi chay ung dung, tuy nhien nen xem xet ky truoc khi su dung trong moi truong san xuat
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Cau hinh cho postgres khi su dung Lob (Large Object), de tranh loi khi luu tru du lieu lon nhu file, anh, v.v.
        jdbc:
          lob:
            non_contextual_creation: true

server:
  port: 8081